apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secure-flask-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Nitesh150791/gitops-repo.git
    targetRevision: main
    path: flask-app/flask-chart
    helm:
      valueFiles:
        - values.yml
  destination:
    server: https://kubernetes.default.svc
    namespace: flask-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
